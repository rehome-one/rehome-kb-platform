name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ============================================================
  # Backend: Python lint + type-check + tests
  # ============================================================
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check (mypy strict)
        run: mypy --strict src tests

      - name: Unit tests
        run: pytest tests/unit --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

      # #114: Dockerfile smoke build — ловит регрессии layer caching,
      # missing files, non-root user. Не push'аем — это integration job.
      - name: Build Docker image (smoke)
        run: docker build -t kb-api:ci .

  # ============================================================
  # Frontend: TypeScript / Next.js
  # ============================================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc --strict)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      # #123: Dockerfile smoke build. Ловит регрессии layer ordering,
      # missing files, non-root user. Не push'аем.
      - name: Build Docker image (smoke)
        run: docker build -t kb-frontend:ci .

  # ============================================================
  # E2E Playwright smoke tests (#156). Pure frontend smoke —
  # не требует backend (login render, 404). Backend-зависимые
  # сценарии (auth flow / SSE chat) — отдельный job с docker
  # compose stack (после landing Integration job upgrade).
  # ============================================================
  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # Cache Playwright browser binaries — `~/.cache/ms-playwright`
      # ~150 MB Chromium. Re-используем между jobs если deps не
      # поменялись.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (if cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        # Browser binaries cached, но apt-system-deps нужны на fresh
        # ubuntu runner'е каждый run (no apt cache).
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npm run e2e

      # Upload report только при failure — debug help'er для red CI.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ============================================================
  # OpenAPI: валидация и контрактные тесты
  # ============================================================
  openapi:
    name: OpenAPI spec validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI 3.1
        run: npx @redocly/cli lint docs/handoff/01_postanovka/04_openapi.yaml

      # oasdiff — Go-tool, не npm package. Раньше использовался `npx oasdiff`,
      # который детерминированно падал с npm 404 (Issue #13). Переход на
      # setup-go + go install: пиннинг на тег v1.15.3 — supply-chain hygiene.
      - name: Setup Go (for oasdiff)
        if: github.event_name == 'pull_request'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install oasdiff
        if: github.event_name == 'pull_request'
        run: go install github.com/oasdiff/oasdiff@v1.15.3

      - name: Check OpenAPI breaking changes
        if: github.event_name == 'pull_request'
        # `--err-ignore` — список approved breaking changes (CLAUDE.md §9
        # workflow). Каждая non-comment строка — substring для матчинга
        # oasdiff error message. См. infra/oasdiff-ignored.txt.
        run: |
          git fetch origin ${{ github.base_ref }}
          oasdiff breaking \
            origin/${{ github.base_ref }}:docs/handoff/01_postanovka/04_openapi.yaml \
            docs/handoff/01_postanovka/04_openapi.yaml \
            --err-ignore infra/oasdiff-ignored.txt

  # ============================================================
  # Security scan: секреты, уязвимости зависимостей
  # ============================================================
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TruffleHog — бесплатен для personal и org аккаунтов (в отличие от
      # gitleaks-action@v2, требующего GITLEAKS_LICENSE для org). Пиннинг
      # на конкретный тег вместо @main — supply-chain hygiene.
      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --only-verified

      - name: Python dependency vulnerabilities (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt

      - name: Node dependency vulnerabilities (npm audit)
        working-directory: frontend
        # --omit=dev: dev-only уязвимости (ESLint chain) исключены.
        # --audit-level=critical: bootstrap-этап. Next.js 14.2.35 имеет
        # 2 known prod vuln (1 high SSRF + 1 moderate postcss XSS) — не
        # critical-уровня, bump до Next.js 15 — отдельный backlog Issue.
        run: npm audit --omit=dev --audit-level=critical

  # ============================================================
  # Integration: end-to-end с реальным Keycloak (docker compose)
  # Закрыто в Issue #21 (E1.3.4). Запускает Keycloak через
  # infra/docker-compose.yml + uvicorn backend, прогоняет тесты
  # помеченные @pytest.mark.integration.
  # ============================================================
  integration:
    name: Integration (Keycloak)
    runs-on: ubuntu-latest
    # ADR-0009: compose теперь требует `${VAR:?required}` для secrets — без
    # этих env vars даже `compose down -v` падает при попытке распарсить YAML.
    # CI integration job — isolated environment, hardcoded dev-only creds OK
    # (см. ADR §"Технические следствия"). Никаких реальных secrets через
    # GitHub Actions secrets — этот job принципиально не нуждается в
    # prod-credentials'ах.
    env:
      POSTGRES_KEYCLOAK_PASSWORD: keycloak
      POSTGRES_KB_PASSWORD: kb
      KEYCLOAK_ADMIN_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Start Keycloak + Postgres-keycloak + Postgres-kb
        working-directory: infra
        run: docker compose up -d keycloak postgres-keycloak postgres-kb

      - name: Wait for Keycloak ready (smoke-test)
        working-directory: infra
        run: bash keycloak/smoke-test.sh
        env:
          HEALTH_RETRIES: "90"  # 3 минуты на cold-start Keycloak в CI

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run DB migrations (alembic upgrade head)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://kb:kb@localhost:5432/rehome_kb
        run: alembic upgrade head

      - name: Start backend uvicorn (background)
        working-directory: backend
        env:
          KC_URL: http://localhost:8080
          KC_REALM: rehome
          KC_AUDIENCE: rehome-platform-m2m
          KC_VERIFY_AUD: "true"
          DATABASE_URL: postgresql+asyncpg://kb:kb@localhost:5432/rehome_kb
        run: |
          nohup uvicorn src.api.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null 2>&1; then
              echo "uvicorn ready"; break
            fi
            sleep 1
          done

      - name: Run integration tests
        working-directory: backend
        env:
          KC_URL: http://localhost:8080
          KC_REALM: rehome
          KC_M2M_CLIENT_SECRET: rehome-platform-m2m-local-dev-secret
          KB_API_URL: http://127.0.0.1:8000
          DATABASE_URL: postgresql+asyncpg://kb:kb@localhost:5432/rehome_kb
        run: pytest tests/integration -m integration -v

      - name: Show uvicorn log on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true

      - name: Show Keycloak log on failure
        if: failure()
        working-directory: infra
        run: docker compose logs keycloak || true

      - name: Stop services
        if: always()
        working-directory: infra
        run: docker compose down -v

  # ============================================================
  # Анти-костыли: проверка кода на типичные ошибки
  # ============================================================
  anti-crutches:
    name: Anti-crutches checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No SELECT without access_level filter
        run: |
          # Эвристика: поиск SELECT * FROM таблиц с user-content
          if grep -rE "SELECT \* FROM (articles|documents|premises_cards|chunks)" \
             --include='*.py' --include='*.sql' \
             | grep -v "WHERE.*access_level"; then
            echo "❌ Найдены SELECT без access_level фильтра"
            exit 1
          fi

      - name: No raw text() SQL against access_level-protected tables
        run: |
          # ADR-0003: запросы к articles/documents/premises_cards/chunks
          # должны идти через ORM-репозиторий, не через text(). Это блокирует
          # обход storage-level фильтра через сырой SQL.
          # `f?` ловит f-string варианты: text("..."), text(f"..."), text(rf"...").
          if grep -rEn 'text\([rRfFbB]{0,2}["'\''].*(SELECT|UPDATE|DELETE|INSERT).*(articles|documents|premises_cards|chunks)' \
             --include='*.py' backend/; then
            echo "❌ Найден raw text() SQL для access_level-protected таблицы — используй Repository"
            exit 1
          fi

      - name: No scope from client payload
        run: |
          # scope должен браться из сессии, не из request body
          if grep -rE "request\.(json|data|POST)\[\"?scope\"?\]" \
             --include='*.py'; then
            echo "❌ scope передаётся клиентом — это нарушение"
            exit 1
          fi

      - name: No localStorage with PII
        run: |
          # ПДн не должны храниться в localStorage
          if grep -rE "localStorage\.(setItem|getItem).*?(passport|phone|email)" \
             --include='*.ts' --include='*.tsx'; then
            echo "❌ ПДн в localStorage запрещены"
            exit 1
          fi

      - name: "No except: pass"
        run: |
          if grep -rE "except.*:\s*$" -A 1 --include='*.py' | grep "pass"; then
            echo "❌ except: pass — кардинальный костыль"
            exit 1
          fi

      - name: TODO without ticket number
        run: |
          # TODO/FIXME должны ссылаться на тикет
          if grep -rE "(TODO|FIXME|HACK)" --include='*.py' --include='*.ts' \
             | grep -vE "#[0-9]+"; then
            echo "⚠️  Найдены TODO/FIXME без номера тикета"
            # warning, не блок
          fi
