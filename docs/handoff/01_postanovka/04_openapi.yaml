openapi: 3.1.0
info:
  title: reHome Knowledge Base API
  version: 1.0.0
  summary: API модуля базы знаний платформы reHome
  description: "Публичный API модуля базы знаний reHome, через который платформа rehome.one\nи другие потребители получают\
    \ доступ к статьям help-центра, документам,\nAI-чату, поиску и карточкам квартир.\n\nПолное описание архитектуры и принципов\
    \ — в документе\n«API базы знаний reHome — ТЗ v1.0».\n\n## Аутентификация\nПоддерживаются два режима:\n- **m2m** (server-to-server):\
    \ OAuth 2.0 Client Credentials через kb-auth Keycloak,\n  Authorization: Bearer <jwt>\n- **user** (browser-to-server):\
    \ HttpOnly Cookie kb_session с JWT,\n  устанавливается при логине пользователя в rehome.one\n\n## Контроль доступа\nКаждый\
    \ ресурс имеет access_level (PUBLIC / LOGGED / AGENT / STAFF / LEGAL / HR_RESTRICTED).\nscope пользователя вычисляется\
    \ бэкендом из проверенного токена,\nНИКОГДА не передаётся клиентом. Фильтрация применяется на уровне хранилища.\n\n##\
    \ Версионирование\nВерсия в URL: /api/v1/. Breaking changes требуют новой мажорной версии\nи параллельной работы старой\
    \ минимум 6 месяцев.\n"
  contact:
    name: reHome Engineering
    email: engineering@rehome.one
    url: https://rehome.one
  license:
    name: Proprietary
  termsOfService: https://rehome.one/legal/api-terms
servers:
- url: https://api.rehome.one/kb
  description: Production
- url: https://api.staging.rehome.one/kb
  description: Staging
- url: https://api.dev.rehome.one/kb
  description: Development
- url: http://localhost:8000/kb
  description: Local development
security:
- BearerAuth: []
- CookieAuth: []
tags:
- name: Health
  description: Health checks и метаданные API
- name: Articles
  description: Статьи help-центра и внутренней wiki
- name: Categories
  description: Категории и теги статей
- name: Documents
  description: Юридические и прочие документы
- name: Premises Cards
  description: Карточки сдаваемых квартир
- name: Chat
  description: AI-чат по базе знаний (RAG)
- name: Search
  description: Универсальный поиск
- name: Webhooks
  description: Управление webhook подписками
- name: Admin
  description: Администрирование kb-модуля (требует scope = staff_admin)
- name: Collaborators
  description: Коллаборанты — внешние исполнители (УК/ТСЖ, клининг, ремонт, страховые и др.)
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Liveness probe
      operationId: health
      security: []
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - ok
  /api/v1/ready:
    get:
      tags:
      - Health
      summary: Readiness probe
      operationId: ready
      security: []
      responses:
        '200':
          description: Все зависимости доступны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: |
            Хотя бы одна зависимость недоступна. Тот же envelope shape, что
            и 200, — клиенту (k8s probe) важен status code; `dependencies`
            map содержит per-service status'ы для ops debugging.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/v1/version:
    get:
      tags:
      - Health
      summary: Версия API
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Информация о версии
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                    example: 1.0.0
                  build_hash:
                    type: string
                  build_date:
                    type: string
                    format: date-time
                  environment:
                    type: string
                    enum:
                    - prod
                    - staging
                    - dev
                    - local
  /api/v1/articles:
    get:
      tags:
      - Articles
      summary: Список статей
      description: 'Возвращает список статей с учётом scope пользователя.

        Cursor-based пагинация. Поддерживает фильтры по категории, аудитории, языку.

        '
      operationId: listArticles
      security:
      - BearerAuth: []
      - CookieAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/AcceptLanguage'
      - name: category
        in: query
        schema:
          type: string
          enum:
          - faq
          - regulation
          - guide
          - policy
          - document
          - glossary
      - name: audience
        in: query
        schema:
          $ref: '#/components/schemas/Audience'
      - name: tags
        in: query
        description: Список тегов через запятую
        schema:
          type: string
          example: сервисный-платёж,оплата
      - name: language
        in: query
        schema:
          $ref: '#/components/schemas/Language'
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Список статей
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
                example: public, max-age=60
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-API-Version:
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ArticleSummary'
                    pagination:
                      $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimit'
    post:
      tags:
      - Articles
      summary: Создать статью
      description: Требует scope ≥ staff_support
      operationId: createArticle
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleInput'
      responses:
        '201':
          description: Создано
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/articles/{slug}:
    parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-z0-9-]+$
    get:
      tags:
      - Articles
      summary: Получить статью по slug
      operationId: getArticleBySlug
      security:
      - BearerAuth: []
      - CookieAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/AcceptLanguage'
      - name: If-None-Match
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Статья
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              description: |
                Фиксируется как `Authorization` для предотвращения утечки
                STAFF-ответа через shared proxy анонимному пользователю
                (ADR-0003, RFC 7234 §4.1).
              schema:
                type: string
                example: Authorization
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Article'
        '304':
          description: Не изменилось с last ETag
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              description: |
                Фиксируется как `Authorization` для предотвращения утечки
                STAFF-ответа через shared proxy анонимному пользователю
                (ADR-0003, RFC 7234 §4.1).
              schema:
                type: string
                example: Authorization
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Articles
      summary: Обновить статью полностью
      operationId: replaceArticle
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      - name: If-Match
        in: header
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleInput'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Article'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    patch:
      tags:
      - Articles
      summary: Частично обновить статью
      operationId: patchArticle
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticlePatch'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Article'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Articles
      summary: Архивировать статью (soft delete)
      operationId: archiveArticle
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Архивировано
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/articles/{slug}/history:
    get:
      tags:
      - Articles
      summary: История изменений статьи
      operationId: getArticleHistory
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          pattern: ^[a-z0-9-]+$
      - $ref: '#/components/parameters/RequestId'
      - name: If-None-Match
        in: header
        schema:
          type: string
      responses:
        '200':
          description: История версий
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              description: |
                Фиксируется как `Authorization` для предотвращения утечки
                STAFF-ответа через shared proxy анонимному пользователю
                (ADR-0003, RFC 7234 §4.1).
              schema:
                type: string
                example: Authorization
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ArticleVersion'
        '304':
          description: Не изменилось с last ETag
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              description: |
                Фиксируется как `Authorization` для предотвращения утечки
                STAFF-ответа через shared proxy анонимному пользователю
                (ADR-0003, RFC 7234 §4.1).
              schema:
                type: string
                example: Authorization
  /api/v1/articles/search:
    post:
      tags:
      - Articles
      summary: Полнотекстовый поиск по статьям
      operationId: searchArticles
      parameters:
      - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - q
              properties:
                q:
                  type: string
                  minLength: 1
                  maxLength: 500
                filters:
                  type: object
                  properties:
                    category:
                      type: string
                    audience:
                      $ref: '#/components/schemas/Audience'
                    tags:
                      type: array
                      items:
                        type: string
                cursor:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 10
      responses:
        '200':
          description: Результаты поиска
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/SearchHit'
                    pagination:
                      $ref: '#/components/schemas/Pagination'
  /api/v1/categories:
    get:
      tags:
      - Categories
      summary: Дерево категорий
      operationId: listCategories
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Category'
  /api/v1/tags:
    get:
      tags:
      - Categories
      summary: Список тегов
      operationId: listTags
      security: []
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Tag'
  /api/v1/documents:
    get:
      tags:
      - Documents
      summary: Список документов
      operationId: listDocuments
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - name: category
        in: query
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - D
          - E
          - F
          description: 'A — публичные документы пользователей,

            B — заключённые договоры,

            C — договоры с подрядчиками,

            D — внутренние,

            E — регуляторы,

            F — шаблоны

            '
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - EXPIRED
          - CANCELLED
      - name: related_entity
        in: query
        description: Фильтр по связанной сущности, например "user:abc-123"
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/DocumentMeta'
                    pagination:
                      $ref: '#/components/schemas/Pagination'
  /api/v1/documents/{id}:
    get:
      tags:
      - Documents
      summary: Метаданные документа
      operationId: getDocument
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/documents/{id}/files:
    post:
      tags:
      - Documents
      summary: Загрузить файл документа
      description: |
        Multipart upload файла, ассоциированного с документом.
        Только для staff-ролей (STAFF access_level и выше).

        Pipeline:
        1. Auth + scope-aware document lookup (404 mask для не-staff).
        2. Read body с size limit `DOCUMENT_MAX_UPLOAD_BYTES`
           (default 50 МБ).
        3. Compute sha256.
        4. Put в MinIO по пути `legal/<category_subdir>/<doc_id>/<version>/<format>.<ext>`
           (TZ §3.2 hierarchy).
        5. Upsert (replace by format) entry в `documents.files` JSONB.
        6. Audit `documents.file.uploaded` с
           `metadata={format, version, size_bytes, sha256}`.

        Реализация ADR-0012 Phase B (#215).
      operationId: uploadDocumentFile
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              - format
              - version
              properties:
                file:
                  type: string
                  format: binary
                  description: Содержимое файла (max `DOCUMENT_MAX_UPLOAD_BYTES`).
                format:
                  type: string
                  enum:
                  - docx
                  - pdf
                  - html
                version:
                  type: string
                  minLength: 1
                  maxLength: 50
                  description: Caller-controlled version label (например, "1.0").
      responses:
        '201':
          description: Файл загружен, entry в `documents.files` upsert'нут.
          content:
            application/json:
              schema:
                type: object
                required:
                - format
                - version
                - size_bytes
                - sha256
                - storage_key
                properties:
                  format:
                    type: string
                    enum:
                    - docx
                    - pdf
                    - html
                  version:
                    type: string
                  size_bytes:
                    type: integer
                    minimum: 0
                  sha256:
                    type: string
                    description: Hex sha256 загруженного содержимого.
                  storage_key:
                    type: string
                    description: MinIO object key (TZ §3.2 hierarchy).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: Файл превышает `DOCUMENT_MAX_UPLOAD_BYTES`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Невалидный format / отсутствующие поля.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: MinIO вернул ошибку (не transient).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: MinIO не сконфигурирован или недоступен.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/documents/{id}/files/{format}:
    get:
      tags:
      - Documents
      summary: Скачать файл документа
      description: |
        Возвращает 302 redirect на pre-signed MinIO URL c TTL 5 минут.
        Authn обязателен (любой scope, видимость по ADR-0003).

        Audit: каждое успешное генерирование URL пишет запись
        `documents.file.downloaded` в audit_log с
        `metadata.format` и `metadata.size_bytes`.

        Anti-enumeration: 404 в трёх случаях (нет доступа, документ
        отсутствует, файл с таким format'ом не загружен) —
        пользователь не различает причины.

        Реализация ADR-0012 Phase A (#214).
      operationId: downloadDocumentFile
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: format
        in: path
        required: true
        schema:
          type: string
          enum:
          - docx
          - pdf
          - html
      responses:
        '302':
          description: Redirect на signed MinIO URL.
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Pre-signed URL с TTL `SIGNED_URL_TTL_SECONDS` (default 300с).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: MinIO вернул ошибку (не transient).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: |
            MinIO не сконфигурирован (`MINIO_ENABLED=false`) или
            недоступен (network / transient 5xx). Клиент может
            повторить запрос с backoff.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/premises-cards/{premises_id}:
    parameters:
    - name: premises_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Premises Cards
      summary: Карточка квартиры
      description: 'Состав возвращаемых полей зависит от scope:

        - guest: только базовые публичные поля

        - tenant (своей квартиры): доступ + Wi-Fi + контакты + правила

        - landlord: финансовый блок + представитель + история

        - staff: всё включая внутренние данные

        '
      operationId: getPremisesCard
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PremisesCard'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Premises Cards
      summary: Обновить карточку
      operationId: updatePremisesCard
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
