  responses:
    BadRequest:
      description: Ошибка валидации
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Не авторизован
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Запрещено по правам
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Не найдено (или нет прав)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Конфликт версий или дубликат
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    PreconditionFailed:
      description: |
        `If-Match` не совпадает с current ETag статьи (optimistic
        concurrency, RFC 7232 §4.2). Клиент должен перечитать ресурс
        и повторить запрос с актуальным ETag.

        Security-инвариант (anti-leak): current ETag в поле `detail`
        ответа НЕ возвращается. Это защищает от enumeration по версии
        статьи через сравнение тел 412-ответов (см. PR #49).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimit:
      description: Превышен лимит запросов
      headers:
        Retry-After:
          schema:
            type: integer
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
