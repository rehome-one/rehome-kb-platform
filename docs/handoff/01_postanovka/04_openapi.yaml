                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Collaborator'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Collaborators
      summary: Обновить карточку коллаборанта
      description: |
        Partial update. `type` и `financial_group` могут меняться, но pair
        invariant (ТЗ §10.3, ADR-0014 §2) валидируется в Pydantic — несовпадение
        → 422. Status можно менять в любую сторону (transition validation отложен
        до Slice 2: `/activate`, `/suspend`).

        Требует STAFF+ scope.
      operationId: patchCollaborator
      x-implementation-status: implemented
      x-implementation-slice: 1
      x-adr: ADR-0014
      parameters:
      - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaboratorInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Collaborator'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Collaborators
      summary: Архивировать коллаборанта (soft delete)
      description: |
        Soft delete — status → ARCHIVED. Привязки к объектам сохраняются
        (Slice 5 PremisesCollaborator). Audit row пишется с
        `metadata.previous_status`.

        Требует STAFF+ scope.
      operationId: archiveCollaborator
      x-implementation-status: implemented
      x-implementation-slice: 1
      x-adr: ADR-0014
      parameters:
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Архивировано
  /api/v1/collaborators/{collaborator_id}/activate:
    post:
      tags:
