      summary: Активация коллаборанта (DRAFT/PENDING_REVIEW → ACTIVE)
      description: 'Активация возможна только когда: counterparty_check = CLEAN,

        contract_document_id заполнен (для групп A/B/C), responsible_internal назначен.

