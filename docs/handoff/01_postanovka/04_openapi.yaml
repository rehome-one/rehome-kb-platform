  /api/v1/collaborators:
    get:
      tags:
      - Collaborators
      summary: Список коллаборантов
      description: |
        Возвращает список внешних коллаборантов (УК/ТСЖ, аварийные службы, клининг,
        переезды, ремонт, страховые и т.д.). Подробно — в ПЗ «База знаний v1.4»
        раздел 10.

        Фильтрация по типу, статусу, географии. Видимость зависит от scope
        (ADR-0014 §3):
        - guest / tenant / landlord / agent: только D-группа (management_company,
          emergency_service) — публичные контакты
        - staff_*: все группы (A/B/C/D)

        **Slice 1 (#231-232 landed):** реализованы фильтры по `type`, `status`,
        `service_area` (ILIKE substring). Фильтры `financial_group`, `city`,
        `district`, `premises_id` — Slice 5 (PremisesCollaborator junction).
      operationId: listCollaborators
      x-implementation-status: implemented
      x-implementation-slice: 1
      x-adr: ADR-0014
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - name: type
        in: query
        schema:
          $ref: '#/components/schemas/CollaboratorType'
      - name: financial_group
        in: query
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - D
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_REVIEW
          - ACTIVE
          - SUSPENDED
          - ARCHIVED
      - name: city
        in: query
        schema:
          type: string
      - name: district
        in: query
        schema:
          type: string
      - name: premises_id
        in: query
        description: Вернуть только коллаборантов, обслуживающих этот объект
        schema:
          type: string
          format: uuid
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/CollaboratorSummary'
                    pagination:
                      $ref: '#/components/schemas/Pagination'
    post:
      tags:
      - Collaborators
      summary: Создать коллаборанта
      description: |
        Создаёт коллаборанта в статусе DRAFT по умолчанию. D-группа
        (management_company, emergency_service) — auto-ACTIVE (ТЗ §3.10.1).
        `financial_group` auto-derive из `type` (кроме `type='other'` —
        обязательно указывать explicitly). Инвариант (type, financial_group)
        per ТЗ §10.3 enforced через CHECK constraint в БД (ADR-0014 §2).

        Требует scope = staff_support+.
      operationId: createCollaborator
      x-implementation-status: implemented
      x-implementation-slice: 1
      x-adr: ADR-0014
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaboratorInput'
      responses:
        '201':
          description: Создано (статус — DRAFT или PENDING_REVIEW)
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Collaborator'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/collaborators/{collaborator_id}:
    parameters:
    - name: collaborator_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Collaborators
      summary: Карточка коллаборанта
      description: |
        Состав возвращаемых полей зависит от scope (ADR-0014 §7):
        - guest / tenant / landlord / agent: CollaboratorPublic — type, brand_name,
          financial_group, status, service_area, working_hours, website, rating
          (БЕЗ юр.реквизитов / contacts.person_name / financial_terms)
        - staff_*: CollaboratorInternal — + name, inn/ogrn/kpp, contacts (полные),
          financial_terms, api_integration, sla, counterparty_check
        - staff_admin (STAFF + LEGAL): + audit_log

        404 при out-of-scope (anti-enumeration mask, ADR-0003).
      operationId: getCollaborator
      x-implementation-status: implemented
      x-implementation-slice: 1
      x-adr: ADR-0014
      responses:
        '200':
          description: OK
          content:
