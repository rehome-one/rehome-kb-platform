  /api/v1/chat/sessions/{session_id}/messages:
    post:
      tags:
      - Chat
      summary: Отправить сообщение в чат
      description: 'Возвращает либо SSE-стрим (Accept: text/event-stream), либо полный JSON-ответ.

        SSE-события: message-start, chunk, citation, message-end, error, done.

        '
      operationId: sendChatMessage
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/CsrfToken'
      - name: Accept
        in: header
        schema:
          type: string
          enum:
          - application/json
          - text/event-stream
          default: text/event-stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - content
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
      responses:
        '200':
          description: Ответ AI (SSE или JSON)
          content:
            text/event-stream:
              schema:
                type: string
                description: "Поток событий:\n  event: message-start\n  data: {\"message_id\": \"...\", \"created_at\": \"\
                  ...\"}\n\n  event: chunk\n  data: {\"text\": \"...\"}\n\n  event: citation\n  data: {\"source\": {...}}\n\
                  \n  event: message-end\n  data: {\"message_id\": \"...\", \"total_tokens\": N}\n\n  event: done\n  data:\
                  \ {}\n"
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ChatMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimit'
