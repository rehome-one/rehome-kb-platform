      summary: Изменить уровень доступа коллаборанта к кабинету
      description: Коллаборант может понизить уровень в любой момент (FULL → LIGHT, LIGHT → NONE). Повысить (NONE → LIGHT,
        LIGHT → FULL) можно только после выполнения первой успешной операции через платформу или одобрения оператором reHome.
        Изменения логируются в audit_log карточки.
      operationId: changeCollaboratorPortalAccess
      x-implementation-status: planned
      x-implementation-slice: 3
      parameters:
      - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - portal_access_level
              properties:
                portal_access_level:
                  $ref: '#/components/schemas/PortalAccessLevel'
                reason:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Collaborator'
        '422':
          description: Повышение уровня недоступно — не выполнены условия
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/collaborators/onboarding:
    post:
      tags:
      - Collaborators
      summary: Самостоятельная заявка коллаборанта (онбординг)
      description: Эндпоинт публичной формы регистрации на rehome.one/partners. Коллаборант сам заявляет о себе, указывает
        тип, желаемый portal_access_level (по умолчанию LIGHT), реквизиты. Создаётся карточка в статусе PENDING_REVIEW, оператор
        reHome проверяет и активирует.
      operationId: submitCollaboratorOnboarding
      x-implementation-status: planned
      x-implementation-slice: 3
      security:
      - {}
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/CollaboratorInput'
              - type: object
                properties:
                  applicant_contact:
                    type: object
                    description: Контакт заявителя для обратной связи
                    required:
                    - full_name
                    - phone
                    - email
                    properties:
                      full_name:
                        type: string
                      phone:
                        type: string
                      email:
                        type: string
                        format: email
                      position:
                        type: string
                  message:
                    type: string
                    description: Произвольное сообщение от заявителя
                required:
                - applicant_contact
      responses:
        '202':
          description: Заявка принята, ожидает рассмотрения
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    format: uuid
                  estimated_review_time:
                    type: string
                    example: 3 рабочих дня
                  message:
                    type: string

  # ==========================================================================
  # Implemented endpoints (#168 OpenAPI sync — landed модули добавлены здесь).
  # Существующие path-определения в спеке выше — design-stage; landed
  # backend имеет собственные эндпоинты ниже. Naming divergence отражает
  # фактический shipping код (см. PR #142 / #147 / #148 / #149 / #153 /
  # #163 / #166).
  # ==========================================================================

  /api/v1/premises-cards:
    get:
      tags: [Premises]
      summary: Список карточек квартир (cursor pagination)
      operationId: listPremisesCards
      parameters:
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
        '400':
          description: Невалидный cursor
    post:
      tags: [Premises]
      summary: Создать карточку квартиры (staff_admin)
      operationId: createPremisesCard
      responses:
        '201':
          description: Создано
        '409':
          description: slug already exists
  /api/v1/premises-cards/search:
    post:
      tags: [Premises]
      summary: Полнотекстовый поиск (Postgres FTS)
      operationId: searchPremisesCards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [q]
              properties:
                q:
                  type: string
                  minLength: 1
                  maxLength: 500
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
      responses:
        '200':
          description: Результаты
  # NB: `/api/v1/premises-cards/{premises_id}` (line 740) — existing
  # design-stage definition; landed реализация использует {slug}
  # parameter (PR #142). Path template renaming — отдельный future cube
  # (требует oasdiff coordination, см. spec §"renames" pattern).

  /api/v1/hr/employees:
    get:
      tags: [HR]
      summary: Список сотрудников (HR_RESTRICTED scope)
      operationId: listHrEmployees
      parameters:
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: include_terminated
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
        '403':
          description: Требуется HR_RESTRICTED scope
    post:
      tags: [HR]
      summary: Создать карточку сотрудника
      operationId: createHrEmployee
      responses:
        '201':
          description: Создано
  /api/v1/hr/employees/{employee_id}:
    get:
      tags: [HR]
      summary: Карточка сотрудника (audited per view)
      operationId: getHrEmployee
      parameters:
      - name: employee_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Не найден
    patch:
      tags: [HR]
      summary: Partial update
      operationId: patchHrEmployee
      parameters:
      - name: employee_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
    delete:
      tags: [HR]
      summary: Архивировать (ФЗ-152 50-year retention compliance)
      operationId: archiveHrEmployee
      parameters:
      - name: employee_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Архивирован

  /api/v1/vault/me:
    get:
      tags: [Vault]
      summary: Текущее crypto state пользователя (для unlock UI)
      operationId: getVaultMe
      responses:
        '200':
          description: salt + pubkey + encrypted_privkey + has_totp bit
  /api/v1/vault/setup:
    post:
      tags: [Vault]
      summary: Initial vault setup (zero-knowledge)
      operationId: setupVault
      responses:
        '201':
          description: Создано
        '409':
          description: Vault already set up
  /api/v1/vault/unlock:
    post:
      tags: [Vault]
      summary: Verify auth_hash (anti-bruteforce, audited)
      operationId: unlockVault
      responses:
        '200':
          description: OK
        '401':
          description: Invalid auth_hash
  /api/v1/vault/secrets:
    get:
      tags: [Vault]
      summary: List accessible secrets (metadata-only)
      operationId: listVaultSecrets
      responses:
        '200':
          description: OK
    post:
      tags: [Vault]
      summary: Create encrypted secret + wraps
      operationId: createVaultSecret
      responses:
        '201':
          description: Создано
  /api/v1/vault/secrets/{secret_id}:
    get:
      tags: [Vault]
      summary: Detail + caller wrapped_key (audited read)
      operationId: getVaultSecret
      parameters:
      - name: secret_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Not found or no access (anti-enumeration)
    put:
      tags: [Vault]
      summary: Update blob (optimistic version match)
      operationId: updateVaultSecret
      parameters:
      - name: secret_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '409':
          description: Version mismatch
    delete:
      tags: [Vault]
      summary: Archive (soft-delete, owner-only)
      operationId: archiveVaultSecret
      parameters:
      - name: secret_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Archived
  /api/v1/vault/totp/setup:
    post:
      tags: [Vault]
      summary: Enable TOTP 2FA (encrypted secret)
      operationId: setupVaultTotp
      responses:
        '200':
          description: OK
        '404':
          description: Vault не setup
  /api/v1/vault/totp:
    delete:
      tags: [Vault]
      summary: Disable TOTP 2FA
      operationId: disableVaultTotp
      responses:
        '204':
          description: Disabled

  /api/v1/vault/groups:
    get:
      tags: [Vault]
      summary: List vault groups (user-membership filtered)
      operationId: listVaultGroups
      responses:
        '200':
          description: Группы пользователя
        '401':
          description: Не аутентифицирован
    post:
      tags: [Vault]
      summary: Create group (auto-owner)
      operationId: createVaultGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  maxLength: 2000
      responses:
        '201':
          description: Группа создана; caller — auto-owner
  /api/v1/vault/groups/{group_id}/members:
    get:
      tags: [Vault]
      summary: List group members (must be member; non-member → 404)
      operationId: listVaultGroupMembers
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Group не найдена ИЛИ caller — не member (anti-enumeration)
    post:
      tags: [Vault]
      summary: Add member (owner-only)
      operationId: addVaultGroupMember
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum: [owner, member]
                  default: member
      responses:
        '201':
          description: Member added
        '403':
          description: Caller — не owner данной группы
        '404':
          description: Group / caller-membership absent
        '409':
          description: User уже member
  /api/v1/vault/groups/{group_id}/members/{user_id}:
    delete:
      tags: [Vault]
      summary: Remove member (owner-only; can't remove self)
      operationId: removeVaultGroupMember
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Removed
        '403':
          description: Caller — не owner ИЛИ попытка removed себя (transfer
            ownership first)
        '404':
          description: Group / member не найден

  /api/v1/audit-log:
    get:
      tags: [Audit]
      summary: Search audit log (LEGAL access)
      description: 'Implemented endpoint для compliance search. ФЗ-152 SAR /
        forensic. См. также `/api/v1/admin/audit-log` (design-stage, не
        реализован).'
      operationId: searchAuditLog
      parameters:
      - name: actor_sub
        in: query
        schema:
          type: string
      - name: resource_type
        in: query
        schema:
          type: string
      - name: resource_id
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
      - name: since
        in: query
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        schema:
          type: string
          format: date-time
      - name: q
        in: query
        description: 'Substring search over metadata JSONB (forensic discovery,
          #183). ILIKE on serialized JSON — bounded; combine with `since` for
          large audit log.'
        schema:
          type: string
          maxLength: 200
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: OK
        '403':
          description: Требуется LEGAL scope
  /api/v1/audit-log/export.csv:
    get:
      tags: [Audit]
      summary: Export audit log as CSV (LEGAL access)
      description: 'Streaming CSV export — same filters как JSON endpoint
        (`GET /audit-log`). Hard cap 10000 rows для anti-DoS. UTF-8 с BOM
        для Excel-compatibility. Columns: created_at, actor_sub, action,
        resource_type, resource_id, metadata (single-line JSON).
        Implemented в Cube U (#170).'
      operationId: exportAuditLogCsv
      parameters:
      - name: actor_sub
        in: query
        schema:
          type: string
          maxLength: 200
      - name: resource_type
        in: query
        schema:
          type: string
          maxLength: 32
      - name: resource_id
        in: query
        schema:
          type: string
          maxLength: 200
      - name: action
        in: query
        schema:
          type: string
          maxLength: 64
      - name: since
        in: query
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        schema:
          type: string
          format: date-time
      - name: q
        in: query
        description: Substring search over metadata JSONB.
        schema:
          type: string
          maxLength: 200
      responses:
        '200':
          description: CSV download (Content-Disposition attachment)
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="audit_log_YYYYMMDD_HHMMSS.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '403':
          description: Требуется LEGAL scope
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer JWT — m2m или user токен.

        m2m: получить через kb-auth Client Credentials Grant.

        '
    CookieAuth:
      type: apiKey
      in: cookie
      name: kb_session
      description: HttpOnly Secure cookie, ставится при логине в rehome.one
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      schema:
        type: string
        format: uuid
      description: UUID запроса для трассировки. Если не передан — генерируется.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        format: uuid
      description: UUID для дедупликации повторных POST/PATCH. Ответ кешируется 24ч.
    CsrfToken:
      name: X-CSRF-Token
      in: header
      schema:
        type: string
      description: CSRF-токен (double-submit). Обязателен для browser-mutations.
    AcceptLanguage:
      name: Accept-Language
      in: header
      schema:
        type: string
        enum:
        - ru
        - en
        default: ru
      description: Язык ответа
  schemas:
    ReadinessResponse:
      type: object
      description: |
        Унифицированный shape для `/ready` ответа (200 и 503). 200 →
        `status='ready'`, все deps `ok`. 503 → `status='not_ready'`,
        как минимум один dep не `ok`. k8s probe смотрит на HTTP status code;
        body даёт ops-debugging detail без раскрытия exception messages
        (ФЗ-152, см. issue #112).
      required:
      - status
      - dependencies
      properties:
        status:
          type: string
          enum:
          - ready
          - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
            - ok
            - degraded
            - down
    Meta:
      type: object
      required:
      - request_id
      - api_version
      - timestamp
      properties:
        request_id:
          type: string
          format: uuid
        api_version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
    Pagination:
      type: object
      properties:
        cursor_next:
          type: [string, 'null']
        cursor_prev:
          type: [string, 'null']
        has_more:
          type: boolean
        total_estimate:
          type: integer
          description: Приблизительная оценка
    ResponseEnvelope:
      type: object
      required:
      - meta
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
    Error:
      type: object
      required:
      - type
      - title
      - status
      - code
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
          format: uuid
        code:
          type: string
          enum:
          - VALIDATION
          - ACCESS_DENIED
          - NOT_FOUND
          - RATE_LIMIT
          - CONFLICT
          - INTERNAL_ERROR
          - METHOD_NOT_ALLOWED
          - GONE
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    AccessLevel:
      type: string
      enum:
      - PUBLIC
      - LOGGED
      - AGENT
      - STAFF
      - LEGAL
      - HR_RESTRICTED
    Audience:
      type: string
      enum:
      - all
      - guest
      - tenant
      - landlord
      - agent
      - staff
    Language:
      type: string
      enum:
      - ru
      - en
      default: ru
    ArticleStatus:
      type: string
      enum:
      - DRAFT
      - PUBLISHED
      - ARCHIVED
    ArticleSummary:
      type: object
      required:
      - id
      - slug
      - title
      - category
      - audience
      - access_level
      - updated_at
      - status
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        short_answer:
          type: string
        category:
          type: string
        audience:
          $ref: '#/components/schemas/Audience'
        access_level:
          $ref: '#/components/schemas/AccessLevel'
        tags:
          type: array
          items:
            type: string
        language:
          $ref: '#/components/schemas/Language'
        updated_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ArticleStatus'
    Article:
      allOf:
      - $ref: '#/components/schemas/ArticleSummary'
      - type: object
        required:
        - body_markdown
        properties:
          body_markdown:
            type: string
          body_html:
            type: string
          related:
            type: array
            items:
              type: string
              format: uuid
          author:
            type: string
          created_at:
            type: string
            format: date-time
          published_at:
            type: [string, 'null']
            format: date-time
          internal_ref:
            type: string
            description: Ссылка на внутренний регламент (только staff)
    ArticleInput:
      type: object
      required:
      - slug
      - title
      - body_markdown
      - category
      - audience
      - access_level
      properties:
        slug:
          type: string
          pattern: ^[a-z0-9-]+$
        title:
          type: string
          maxLength: 200
        short_answer:
          type: string
          maxLength: 300
        body_markdown:
          type: string
        category:
          type: string
        audience:
          $ref: '#/components/schemas/Audience'
        access_level:
          $ref: '#/components/schemas/AccessLevel'
        tags:
          type: array
          items:
            type: string
        related:
          type: array
          items:
            type: string
            format: uuid
        language:
          $ref: '#/components/schemas/Language'
        status:
          $ref: '#/components/schemas/ArticleStatus'
    ArticlePatch:
      type: object
      description: Все поля опциональны
      properties:
        title:
          type: string
          maxLength: 200
        short_answer:
          type: string
          maxLength: 300
        body_markdown:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/ArticleStatus'
    ArticleVersion:
      type: object
      properties:
        version:
          type: integer
        author:
          type: string
          description: Keycloak `sub` claim (UUID) — идентификатор актора, не имя.
        changed_at:
          type: string
          format: date-time
        changes_summary:
          type: string
        event:
          type: string
          enum:
          - CREATE
          - UPDATE
          - ARCHIVE
          description: Тип события, породившего эту версию.
    Category:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        article_count:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Tag:
      type: object
      properties:
        name:
          type: string
        article_count:
          type: integer
    DocumentMeta:
      type: object
      required:
      - id
      - title
      - category
      - status
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
          enum:
          - A
          - B
          - C
          - D
          - E
          - F
        version:
          type: string
        effective_from:
          type: string
          format: date
        effective_to:
          type: [string, 'null']
          format: date
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - EXPIRED
          - CANCELLED
        counterparty:
          type: [string, 'null']
        confidentiality:
          type: string
          enum:
          - PUBLIC
          - INTERNAL
          - RESTRICTED
        related_entity:
          type: [string, 'null']
        files:
          type: array
          items:
            type: object
            properties:
              format:
                type: string
                enum:
                - docx
                - pdf
                - html
              size_bytes:
                type: integer
              sha256:
                type: string
              storage_key:
                type: [string, 'null']
                description: |
                  MinIO object key (TZ §3.2). `null` для legacy rows
                  без загруженного файла — download endpoint вернёт
                  404. ADR-0012 Phase A (#214).
    Document:
      allOf:
