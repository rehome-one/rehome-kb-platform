# reHome KB — local-dev infrastructure
#
# Сервисы:
#   - postgres-keycloak — БД для Keycloak (порт изолирован, без проброса)
#   - keycloak          — SSO (порты 8080, 9000)
#   - postgres-kb       — БД для kb-API (articles/...) на порту 5432
#
# Запуск (ADR-0009 secrets management): через `infra/Makefile`:
#     make -C infra decrypt-dev   # deploy/secrets/dev.enc.yaml → .env.local
#     make -C infra up            # docker compose --env-file .env.local up -d
#
# Direct compose также работает если env vars выставлены (CI / advanced):
#     docker compose --env-file ../.env.local up -d
#
# Документация: infra/keycloak/README.md
# ADR: 0007 (Keycloak), 0008 (ORM), 0009 (secrets).
#
# ADR-0009: secrets используют `${VAR:?required}` syntax — compose FAILS
# fast если variable не выставлена (никакого silent fallback'а на embedded
# dev passwords). Non-secrets (DB names, usernames, ports) сохраняют
# `:-default` — это config, не secret.
#
# Production deployment — отдельный Issue Phase 2 (TLS, HA, prod credentials).

services:
  postgres-keycloak:
    image: postgres:16
    container_name: rehome-kb-postgres-keycloak
    environment:
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER:-keycloak}
      # SECRET — required, no default.
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:?POSTGRES_KEYCLOAK_PASSWORD required (см. ADR-0009 + make decrypt-dev)}
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: rehome-kb-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER:-keycloak}
      # SECRET (взято из postgres-keycloak же)
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:?POSTGRES_KEYCLOAK_PASSWORD required}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      # SECRET — admin console password.
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD required (см. ADR-0009)}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/localhost/9000 \
          && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 \
          && cat <&3 | grep -q '200 OK'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-kb:
    image: postgres:16
    container_name: rehome-kb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_KB_DB:-rehome_kb}
      POSTGRES_USER: ${POSTGRES_KB_USER:-kb}
      # SECRET — kb application database password.
      POSTGRES_PASSWORD: ${POSTGRES_KB_PASSWORD:?POSTGRES_KB_PASSWORD required (см. ADR-0009 + make decrypt-dev)}
    ports:
      - "5432:5432"
    volumes:
      - postgres-kb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KB_USER:-kb} -d ${POSTGRES_KB_DB:-rehome_kb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-keycloak-data:
    name: rehome-kb-postgres-keycloak-data
  postgres-kb-data:
    name: rehome-kb-postgres-kb-data
